<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="50%" stop-color="#12131e"/>
      <stop offset="100%" stop-color="#07080d"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2e93"/>
      <stop offset="50%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>

    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    .pulsing-grid {
      animation: pulse 4s ease-in-out infinite;
    }
    .floating-logo {
      animation: float 6s ease-in-out infinite;
    }
    .flow-line {
      stroke-dasharray: 8 12;
      animation: dash 2s linear infinite;
    }
    .text-title {
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#primary-grad);
      letter-spacing: 2px;
    }
    .text-subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #a0aec0;
      letter-spacing: 4px;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)"/>

  <!-- Grid Pattern -->
  <g class="pulsing-grid" opacity="0.15">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" stroke="#ffffff" stroke-width="0.5"/>
    <path d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 550,0 L 550,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Decorative Waves / Curves -->
  <path d="M-100,200 Q200,100 400,180 T900,80" stroke="url(#secondary-grad)" stroke-width="2" opacity="0.3" fill="none"/>
  <path d="M-50,220 Q250,80 450,200 T850,110" stroke="url(#primary-grad)" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- Neural Network Nodes & Attacks Visualization (Dynamic aspect) -->
  <g class="floating-logo" transform="translate(80, 0)">
    <!-- Teacher Node (Large) -->
    <circle cx="80" cy="125" r="22" fill="#12131e" stroke="url(#secondary-grad)" stroke-width="3" filter="url(#glow)"/>
    <text x="80" y="130" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00f0ff" text-anchor="middle">T</text>

    <!-- Student Node (Small) -->
    <circle cx="200" cy="125" r="16" fill="#12131e" stroke="url(#primary-grad)" stroke-width="2" filter="url(#soft-glow)"/>
    <text x="200" y="129" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ff0055" text-anchor="middle">S</text>

    <!-- Knowledge Distillation flow -->
    <path d="M 105,125 L 180,125" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path class="flow-line" d="M 105,125 L 180,125" stroke="url(#primary-grad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Adversarial Intercept Node -->
    <circle cx="142" cy="85" r="10" fill="#0a0b10" stroke="#ff8a00" stroke-width="2" filter="url(#soft-glow)"/>
    <text x="142" y="89" font-family="sans-serif" font-size="8" font-weight="bold" fill="#ff8a00" text-anchor="middle">⚡</text>
    
    <path d="M 142,95 L 142,125" stroke="#ff8a00" stroke-dasharray="3 3" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Title & Description Text -->
  <g transform="translate(340, 115)">
    <text class="text-title" x="0" y="0" filter="url(#soft-glow)">AWESOME DISTILLATION</text>
    <text class="text-title" x="0" y="42" fill="#ffffff" font-size="34">ATTACKS</text>
    <text class="text-subtitle" x="3" y="75">THE EVOLUTION OF MODEL EXTRACTION</text>
  </g>

</svg>
